<body>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── THEME ────────────────────────────────────────────────────────────────────
const C = {

  paper: "#F8FAFC", coral: "#ef476f", green: "#06d6a0", mint: "#34d399",

const SECTIONS = ["welcome","vocab","writing","order","partwhole","unitrate","realworld","mixed","exit","results"];

// ─── QUESTION DATA ────────────────────────────────────────────────────────────

const VOCAB_QUESTIONS = [

  { term: "Rate", options: ["A ratio that compares same units","Any number written as a fraction","A ratio that compares quantities with different units","Another word for percent"], correct: 2 },
  { term: "Unit Rate", options: ["A rate where the first number is 1","A rate where the second number is 1","Any rate written as a fraction","A rate that uses only whole numbers"], correct: 1 },
  { term: '"For every"', options: ["A phrase used to describe subtraction","A phrase that signals a ratio relationship","A phrase only used for unit rates","A phrase that means equal to"], correct: 1 },
  { term: "Equivalent Ratios", options: ["Ratios that look the same","Ratios that have the same value","Ratios that add up to 1","Ratios that are always whole numbers"], correct: 1 },

  {

    visual: { type: "people", boys: 12, girls: 14 },
  },
  {
    scenario: "A necklace has 8 red beads and 6 white beads.",
    question: "What is the ratio of red beads to white beads?",
    words: "8 to 6", colon: "8:6", fraction: "8/6",
    visual: { type: "beads", red: 8, white: 6 },
  },

const ORDER_QUESTIONS = [
  {
    scenario: "There are 4 cats and 7 dogs at the pet store.",
    parts: [
      { q: "Cats to dogs", answer: "4:7" },
      { q: "Dogs to cats", answer: "7:4" },

const PARTWHOLE_QUESTIONS = [

    ]
  },
  {
    scenario: "A team has 6 sixth-graders and 4 seventh-graders.",
    parts: [
      { q: "Sixth-graders to seventh-graders", answer: "6:4", type: "part-to-part" },
      { q: "Seventh-graders to total", answer: "4:10", type: "part-to-whole" },
    ]

const UNITRATE_PROBLEMS = [
  { problem: "5 notebooks cost $15.", question: "What is the cost per notebook?", total: 15, count: 5, unit: "dollars per notebook", answer: "3", prefix: "$", visual: "notebooks" },
  { problem: "A car travels 240 miles in 4 hours.", question: "What is the speed in miles per hour?", total: 240, count: 4, unit: "miles per hour", answer: "60", prefix: "", visual: "car" },
  { problem: "A baker makes 36 cookies in 3 batches.", question: "How many cookies per batch?", total: 36, count: 3, unit: "cookies per batch", answer: "12", prefix: "", visual: "cookies" },
  { problem: "8 gallons of gas cost $28.", question: "What is the price per gallon?", total: 28, count: 8, unit: "dollars per gallon", answer: "3.50", prefix: "$", visual: "gas" },

const REALWORLD_PROBLEMS = [
  {
    scenario: "You're at the grocery store comparing two brands of juice.",
    brandA: { name: "Sunny Sip", amount: "64 oz", price: "$4.00" },

    answerA: "5", answerB: "6",
    better: "B",

const MIXED_PRACTICE = [
  { type: "mc", question: 'A recipe uses 2 cups of flour and 3 cups of sugar. What is the ratio of flour to sugar?', options: ["3:2","2:3","2:5","3:5"], correct: 1 },
  { type: "mc", question: "Which of these is a unit rate?", options: ["6 apples for $3","$2.50 per pound","12 eggs in 2 cartons","100 miles in 2 hours"], correct: 1 },
  { type: "mc", question: "A store sells 4 pens for $10. What is the unit price?", options: ["$4.00 per pen","$2.50 per pen","$0.40 per pen","$2.00 per pen"], correct: 1 },
  { type: "mc", question: "If the ratio of cats to dogs is 5:8, what is the ratio of cats to total animals?", options: ["5:8","8:5","5:13","8:13"], correct: 2 },

  { type: "mc", question: "A unit rate tells how much for ___.", options: ["2","10","100","1"], correct: 3 },

// ─── UTILITY ──────────────────────────────────────────────────────────────────

function generateCode(name, scores) {
  const total = Object.values(scores).reduce((a,b) => a+b, 0);
  const ts = Date.now().toString(36).slice(-4).toUpperCase();
  const initials = name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0,3);
  return `${initials}-${total}-${ts}`;
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────

const nextBtnStyle = {
  padding: "14px 40px", fontSize: 15, fontWeight: 800, letterSpacing: ".04em",
  border: "none", borderRadius: 999, cursor: "pointer", textTransform: "uppercase",
  background: `linear-gradient(135deg, ${C.teal}, ${C.blue})`, color: "#fff",
  transition: "all .3s", boxShadow: "0 4px 20px rgba(31,111,235,0.3)",
};

function ProgressBar({ current, total }) {
  const pct = Math.round((current / (total - 1)) * 100);
  return (
    <div style={{ width:"100%", background:"rgba(255,255,255,0.06)", borderRadius:999, height:8, overflow:"hidden" }}>
      <div style={{ width:pct+"%", height:"100%", background:`linear-gradient(90deg, ${C.teal}, ${C.blue}, ${C.orange})`, borderRadius:999, transition:"width 0.5s cubic-bezier(.4,0,.2,1)" }} />
    </div>
  );
}

function SectionNav({ idx, onNav }) {
  const labels = { welcome:"Start", vocab:"Vocab", writing:"Write", order:"Order", partwhole:"Part/Whole", unitrate:"Unit Rate", realworld:"Real World", mixed:"Mixed", exit:"Exit Ticket", results:"Results" };
  return (
    <div style={{ display:"flex", gap:5, flexWrap:"wrap", justifyContent:"center", marginBottom:4 }}>
      {SECTIONS.map((s, i) => (
        <button key={s} onClick={() => onNav(i)} style={{
          padding:"5px 10px", fontSize:10, fontWeight: i===idx ? 800 : 500, letterSpacing:".03em",
          border:"none", borderRadius:999, cursor:"pointer",
          background: i===idx ? `linear-gradient(135deg,${C.teal},${C.blue})` : "rgba(255,255,255,0.06)",
          color: i===idx ? "#fff" : "rgba(255,255,255,0.4)", transition:"all .25s", textTransform:"uppercase",
        }}>{labels[s]}</button>
      ))}
    </div>
  );
}

function SectionHeader({ icon, title, subtitle }) {
  return (
    <div style={{ marginBottom: 28, animation: "fadeUp .5s ease" }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>{icon}</div>
      <h2 style={{ fontSize: 24, fontWeight: 900, color: "#fff", marginBottom: 6, lineHeight: 1.2 }}>{title}</h2>
      <p style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", lineHeight: 1.5 }}>{subtitle}</p>
    </div>
  );
}

function OptionButton({ text, selected, correct, revealed, onClick }) {
  let bg = "rgba(255,255,255,0.04)", border = "1px solid rgba(255,255,255,0.1)", color = "rgba(255,255,255,0.85)";
  if (selected && !revealed) { bg = `rgba(31,111,235,0.15)`; border = `1px solid ${C.blue}`; color = "#fff"; }
  if (revealed && selected && correct) { bg = "rgba(6,214,160,0.18)"; border = `1px solid ${C.green}`; color = C.green; }
  if (revealed && selected && !correct) { bg = "rgba(239,71,111,0.18)"; border = `1px solid ${C.coral}`; color = C.coral; }
  if (revealed && !selected && correct) { bg = "rgba(6,214,160,0.08)"; border = `1px solid rgba(6,214,160,0.4)`; color = C.green; }
  return (
    <button onClick={onClick} disabled={revealed} style={{
      display:"block", width:"100%", textAlign:"left", padding:"12px 16px", fontSize:14, lineHeight:1.45,
      fontFamily:"'DM Sans',sans-serif", background:bg, border, color, borderRadius:10,
      cursor: revealed ? "default" : "pointer", transition:"all .2s", marginBottom:8,
    }}>
      {text}
      {revealed && selected && correct && <span style={{ float:"right" }}>✓</span>}
      {revealed && selected && !correct && <span style={{ float:"right" }}>✗</span>}
    </button>
  );
}

function Callout({ color, title, children, style: s }) {
  return (
    <div style={{ background: color + "12", border: `1px solid ${color}40`, borderRadius: 12, padding: "14px 18px", marginBottom: 14, ...s }}>
      {title && <div style={{ fontSize: 11, fontWeight: 800, color: color, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8 }}>{title}</div>}
      <div style={{ fontSize: 14, color: "rgba(255,255,255,0.8)", lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

function BeadVisual({ blue = 0, gold = 0, red = 0, white = 0, size = 16, style: s }) {
  const beads = [
    ...Array(blue).fill(C.blue),
    ...Array(red).fill(C.coral),
    ...Array(gold).fill(C.gold),
    ...Array(white).fill("#e2e8f0"),
  ];
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center", padding: "10px 0", ...s }}>
      {beads.map((c, i) => (
        <div key={i} style={{
          width: size, height: size, borderRadius: "50%", background: c,
          boxShadow: `0 2px 8px ${c}40`, animation: `popIn .3s ease ${i * 0.04}s both`,
        }} />
      ))}
    </div>
  );
}

function FruitVisual({ apples, oranges }) {
  return (
    <div style={{ display:"flex", gap:6, flexWrap:"wrap", justifyContent:"center", padding:"10px 0" }}>
      {Array(apples).fill(0).map((_, i) => <span key={"a"+i} style={{ fontSize:22, animation:`popIn .3s ease ${i*0.05}s both` }}>🍎</span>)}
      {Array(oranges).fill(0).map((_, i) => <span key={"o"+i} style={{ fontSize:22, animation:`popIn .3s ease ${(apples+i)*0.05}s both` }}>🍊</span>)}

        <thead>
          <tr style={{ background:"rgba(255,255,255,0.06)" }}>

            <th style={{ ...cellStyle, color:C.blue, minWidth:70 }}>Unit</th>
            <th style={{ ...cellStyle, color:C.orange, minWidth:70 }}>Given</th>

        </thead>
        <tbody>
          <tr style={{ borderTop:"1px solid rgba(255,255,255,0.08)" }}>
            <td style={{ ...cellStyle, color:"rgba(255,255,255,0.6)" }}>{label1}</td>
            <td style={{ ...cellStyle, color: showAnswer ? C.blue : "rgba(255,255,255,0.3)" }}>{showAnswer ? unitVal1 : "?"}</td>
            <td style={{ ...cellStyle, color:"rgba(255,255,255,0.85)" }}>{val1}</td>
          </tr>
          <tr style={{ borderTop:"1px solid rgba(255,255,255,0.08)" }}>
            <td style={{ ...cellStyle, color:"rgba(255,255,255,0.6)" }}>{label2}</td>
            <td style={{ ...cellStyle, color: showAnswer ? C.orange : "rgba(255,255,255,0.3)" }}>{showAnswer ? unitVal2 : "?"}</td>
            <td style={{ ...cellStyle, color:"rgba(255,255,255,0.85)" }}>{val2}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function DoubleNumberLine({ topLabel, bottomLabel, topVals, bottomVals, showAnswer }) {

    <div style={{ padding:"16px 0 20px", position:"relative" }}>

function Welcome({ onNext, studentName, setStudentName }) {

// ─── SECTION 1: VOCABULARY ───────────────────────────────────────────────────

function VocabSection({ onNext, score, setScore }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const allDone = Object.keys(revealed).length === VOCAB_QUESTIONS.length;

  function select(qi, oi) {
    if (revealed[qi] !== undefined) return;
    setAnswers(a => ({ ...a, [qi]: oi }));
  }
  function check(qi) {
    if (answers[qi] === undefined) return;
    setRevealed(r => ({ ...r, [qi]: true }));
  }

  useEffect(() => {
    if (allDone) {
      const pts = VOCAB_QUESTIONS.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
      setScore(sc => ({ ...sc, vocab: pts }));
    }
  }, [allDone]);

  return (
    <div style={{ animation: "fadeUp .5s ease" }}>
      <SectionHeader icon="📖" title="Section 1: Vocabulary Match" subtitle="Match each math term to its correct definition. Tap your choice, then check." />
      {VOCAB_QUESTIONS.map((q, qi) => (
        <div key={qi} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:"18px 20px", marginBottom:16, animation:`fadeUp .4s ease ${qi*0.08}s both` }}>
          <div style={{ fontSize:11, color:C.blue, fontWeight:800, textTransform:"uppercase", letterSpacing:".08em", marginBottom:4 }}>Term {qi+1}</div>
          <div style={{ fontSize:18, fontWeight:800, color:"#fff", marginBottom:14 }}>{q.term}</div>
          {q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi]===oi} correct={oi===q.correct} revealed={!!revealed[qi]} onClick={() => select(qi,oi)} />
          ))}
          {!revealed[qi] && answers[qi] !== undefined && (
            <button onClick={() => check(qi)} style={{ marginTop:4, padding:"8px 24px", fontSize:12, fontWeight:700, border:`1px solid ${C.blue}`, borderRadius:999, background:"transparent", color:C.blue, cursor:"pointer" }}>Check Answer</button>
          )}
          {revealed[qi] && answers[qi] !== VOCAB_QUESTIONS[qi].correct && (
            <div style={{ marginTop:8, fontSize:13, color:C.coral }}>The correct answer is: <strong>{q.options[q.correct]}</strong></div>
          )}
        </div>
      ))}
      {allDone && (
        <div style={{ textAlign:"center", marginTop:16, animation:"popIn .4s ease" }}>
          <div style={{ color:C.green, fontSize:15, fontWeight:700, marginBottom:14 }}>Section complete! {score.vocab || 0}/{VOCAB_QUESTIONS.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>Next Section →</button>
        </div>
      )}
    </div>

// ─── SECTION 7: MIXED PRACTICE ──────────────────────────────────────────────

function MixedSection({ onNext, score, setScore }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const allDone = Object.keys(revealed).length === MIXED_PRACTICE.length;

  function select(qi, oi) {
    if (revealed[qi] !== undefined) return;
    setAnswers(a => ({ ...a, [qi]: oi }));
  }
  function check(qi) {
    if (answers[qi] === undefined) return;
    setRevealed(r => ({ ...r, [qi]: true }));
  }

  useEffect(() => {
    if (allDone) {
      const pts = MIXED_PRACTICE.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
      setScore(sc => ({ ...sc, mixed: pts }));
    }
  }, [allDone]);

  return (
    <div style={{ animation:"fadeUp .5s ease" }}>
      <SectionHeader icon="🔥" title="Section 7: Mixed Practice" subtitle="Show what you know! These questions mix everything from the lesson." />

      {MIXED_PRACTICE.map((q, qi) => (
        <div key={qi} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:"18px 20px", marginBottom:16, animation:`fadeUp .4s ease ${qi*0.06}s both` }}>
          <div style={{ fontSize:11, color:C.orange, fontWeight:800, textTransform:"uppercase", letterSpacing:".08em", marginBottom:4 }}>Question {qi+1}</div>
          <div style={{ fontSize:15, fontWeight:700, color:"#fff", marginBottom:12 }}>{q.question}</div>
          {q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi]===oi} correct={oi===q.correct} revealed={!!revealed[qi]} onClick={() => select(qi,oi)} />
          ))}
          {!revealed[qi] && answers[qi] !== undefined && (
            <button onClick={() => check(qi)} style={{ marginTop:4, padding:"8px 24px", fontSize:12, fontWeight:700, border:`1px solid ${C.orange}`, borderRadius:999, background:"transparent", color:C.orange, cursor:"pointer" }}>Check</button>
          )}
          {revealed[qi] && answers[qi] !== q.correct && (
            <div style={{ marginTop:8, fontSize:13, color:C.coral }}>Correct: <strong>{q.options[q.correct]}</strong></div>
          )}
        </div>
      ))}

      {allDone && (
        <div style={{ textAlign:"center", marginTop:16, animation:"popIn .4s ease" }}>
          <div style={{ color:C.green, fontSize:15, fontWeight:700, marginBottom:14 }}>Section complete! {score.mixed || 0}/{MIXED_PRACTICE.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>Next Section →</button>
        </div>
      )}
    </div>
  );
}

// ─── SECTION 8: EXIT TICKET ─────────────────────────────────────────────────

function ExitTicketSection({ onNext, score, setScore }) {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);

  function doCheck() {
    setChecked(true);
    let pts = 0;
    EXIT_TICKET.forEach((q, qi) => {
      if (q.type === "mc") {
        if (answers[qi] === q.correct) pts++;
      } else {
        const a = (answers[`fill-${qi}`]||"").replace(/[$ ]/g,"").trim();
        if (a === q.answer) pts++;
      }
    });
    setScore(sc => ({ ...sc, exit: pts }));
  }

  const allAnswered = EXIT_TICKET.every((q, qi) => {
    if (q.type === "mc") return answers[qi] !== undefined;
    return (answers[`fill-${qi}`]||"").trim() !== "";
  });

  return (
    <div style={{ animation:"fadeUp .5s ease" }}>
      <SectionHeader icon="🎫" title="Exit Ticket" subtitle="Last step! Show Mr. Omar you've mastered ratios and unit rates." />

      <Callout color={C.coral} title="Important">
        Answer ALL questions before checking. You only get one chance — just like a real exit ticket!
      </Callout>

      {EXIT_TICKET.map((q, qi) => (
        <div key={qi} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:"18px 20px", marginBottom:16, animation:`fadeUp .4s ease ${qi*0.08}s both` }}>
          <div style={{ fontSize:11, color:C.teal, fontWeight:800, textTransform:"uppercase", letterSpacing:".08em", marginBottom:4 }}>Question {qi+1}</div>
          <div style={{ fontSize:15, fontWeight:700, color:"#fff", marginBottom:12 }}>{q.question}</div>

          {q.type === "mc" && q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi]===oi} correct={oi===q.correct} revealed={checked} onClick={() => !checked && setAnswers(a => ({ ...a, [qi]: oi }))} />
          ))}

          {q.type === "fill" && (
            <div>
              <input
                value={answers[`fill-${qi}`]||""}
                onChange={e => setAnswers(a => ({ ...a, [`fill-${qi}`]: e.target.value }))}
                disabled={checked}
                placeholder="Type your answer"
                style={{
                  padding:"10px 14px", fontSize:16, fontWeight:700, fontFamily:"'JetBrains Mono',monospace",
                  background:"rgba(255,255,255,0.05)", borderRadius:10, color:"#fff", width:180, textAlign:"center",
                  border: checked ? `2px solid ${(answers[`fill-${qi}`]||"").replace(/[$ ]/g,"").trim() === q.answer ? C.green : C.coral}` : "1px solid rgba(255,255,255,0.15)",
                }}
              />
              {checked && (answers[`fill-${qi}`]||"").replace(/[$ ]/g,"").trim() !== q.answer && (
                <div style={{ marginTop:6, fontSize:13, color:C.coral }}>Correct answer: <strong>{q.answer}</strong></div>
              )}
            </div>
          )}
        </div>
      ))}

      {!checked && (
        <div style={{ textAlign:"center", marginTop:16 }}>
          <button onClick={doCheck} disabled={!allAnswered} style={{ ...nextBtnStyle, opacity: allAnswered ? 1 : 0.35, cursor: allAnswered ? "pointer" : "not-allowed" }}>Submit Exit Ticket</button>
        </div>
      )}

      {checked && (
        <div style={{ textAlign:"center", marginTop:16, animation:"popIn .4s ease" }}>
          <div style={{ color:C.green, fontSize:15, fontWeight:700, marginBottom:14 }}>Exit ticket submitted! {score.exit || 0}/{EXIT_TICKET.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>See My Results →</button>
        </div>
      )}
    </div>
  );
}

// ─── RESULTS ────────────────────────────────────────────────────────────────

function ResultsSection({ score, studentName, onRestart }) {
  const [copied, setCopied] = useState(false);

  const sections = [
    { key:"vocab", label:"Vocabulary", total:VOCAB_QUESTIONS.length, icon:"📖" },
    { key:"writing", label:"Writing Ratios", total:WRITING_RATIOS.length*3, icon:"✏️" },
    { key:"order", label:"Order Matters", total:ORDER_QUESTIONS.reduce((s,q)=>s+q.parts.length,0), icon:"🔄" },
    { key:"partwhole", label:"Part vs Whole", total:PARTWHOLE_QUESTIONS.reduce((s,q)=>s+q.parts.length,0), icon:"🧩" },
    { key:"unitrate", label:"Unit Rates", total:UNITRATE_PROBLEMS.length, icon:"🎯" },
    { key:"realworld", label:"Real World", total:REALWORLD_PROBLEMS.length, icon:"🌍" },
    { key:"mixed", label:"Mixed Practice", total:MIXED_PRACTICE.length, icon:"🔥" },
    { key:"exit", label:"Exit Ticket", total:EXIT_TICKET.length, icon:"🎫" },
  ];

  const totalPts = sections.reduce((s, sec) => s + (score[sec.key] || 0), 0);
  const totalMax = sections.reduce((s, sec) => s + sec.total, 0);
  const pct = Math.round((totalPts / totalMax) * 100);
  const code = generateCode(studentName, score);

  let grade = "Keep Practicing!", gradeColor = C.coral, emoji = "💪";
  if (pct >= 90) { grade = "Ratio Master!"; gradeColor = C.green; emoji = "🏆"; }
  else if (pct >= 75) { grade = "Great Job!"; gradeColor = C.blue; emoji = "⭐"; }
  else if (pct >= 60) { grade = "Good Effort!"; gradeColor = C.gold; emoji = "👍"; }

  function copyResults() {
    const lines = [
      `RATIOS & UNIT RATES — WORKSHEET RESULTS`,
      `Student: ${studentName}`,
      `Date: ${new Date().toLocaleDateString()}`,
      `Code: ${code}`,
      ``,
      `Overall: ${totalPts}/${totalMax} (${pct}%)`,
      `Grade: ${grade}`,
      ``,
      `SECTION BREAKDOWN:`,
      ...sections.map(s => `  ${s.label}: ${score[s.key]||0}/${s.total}`),
    ];
    navigator.clipboard.writeText(lines.join("\n")).then(() => setCopied(true));
    setTimeout(() => setCopied(false), 2500);
  }

  return (
    <div style={{ textAlign:"center", maxWidth:540, margin:"0 auto", animation:"fadeUp .6s ease" }}>
      <div style={{ fontSize:56, marginBottom:8, animation:"float 3s ease-in-out infinite" }}>{emoji}</div>
      <h2 style={{ fontSize:28, fontWeight:900, color:gradeColor, marginBottom:4 }}>{grade}</h2>
      <div style={{ fontSize:15, color:"rgba(255,255,255,0.5)", marginBottom:24 }}>{studentName}'s Results</div>

      <div style={{ position:"relative", width:170, height:170, margin:"0 auto 28px" }}>
        <svg viewBox="0 0 170 170" style={{ transform:"rotate(-90deg)" }}>
          <circle cx="85" cy="85" r="72" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="12" />
          <circle cx="85" cy="85" r="72" fill="none" stroke={gradeColor} strokeWidth="12" strokeDasharray={(pct/100)*452+" 452"} strokeLinecap="round" style={{ transition:"stroke-dasharray 1.2s ease" }} />
        </svg>
        <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ fontSize:38, fontWeight:900, color:"#fff" }}>{pct}%</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>{totalPts}/{totalMax}</div>
        </div>
      </div>

      <div style={{ textAlign:"left", marginBottom:24 }}>
        {sections.map((sec) => {
          const pts = score[sec.key] || 0;
          const p = sec.total > 0 ? Math.round((pts/sec.total)*100) : 0;
          return (
            <div key={sec.key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, marginBottom:8, animation:`fadeUp .3s ease ${sections.indexOf(sec)*0.05}s both` }}>
              <span style={{ fontSize:18 }}>{sec.icon}</span>
              <span style={{ flex:1, fontSize:13, color:"rgba(255,255,255,0.75)", fontWeight:600 }}>{sec.label}</span>
              <div style={{ width:80, height:6, background:"rgba(255,255,255,0.06)", borderRadius:999, overflow:"hidden" }}>
                <div style={{ width:p+"%", height:"100%", background: p===100 ? C.green : p>=60 ? C.blue : C.coral, borderRadius:999, transition:"width .6s" }} />
              </div>
              <span style={{ fontSize:13, fontWeight:700, color:"#fff", minWidth:44, textAlign:"right", fontFamily:"'JetBrains Mono',monospace" }}>{pts}/{sec.total}</span>
            </div>
          );
        })}
      </div>

      {/* Completion Code */}
      <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:14, padding:"20px", marginBottom:20 }}>
        <div style={{ fontSize:11, fontWeight:800, color:C.orange, textTransform:"uppercase", letterSpacing:".08em", marginBottom:8 }}>Your Completion Code</div>
        <div style={{ fontSize:28, fontWeight:900, fontFamily:"'JetBrains Mono',monospace", color:"#fff", letterSpacing:".1em", marginBottom:12 }}>{code}</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:14 }}>Share this code with Mr. Omar or copy your full results below.</div>
        <button onClick={copyResults} style={{
          padding:"10px 28px", fontSize:13, fontWeight:700, border:`1px solid ${C.teal}`,
          borderRadius:999, background: copied ? `${C.green}20` : "transparent",
          color: copied ? C.green : C.teal, cursor:"pointer", transition:"all .3s",
        }}>
          {copied ? "✓ Copied to Clipboard!" : "📋 Copy Full Results"}
        </button>
      </div>

      <button onClick={onRestart} style={{ padding:"12px 36px", fontSize:14, fontWeight:700, border:"1px solid rgba(255,255,255,0.12)", borderRadius:999, background:"transparent", color:"rgba(255,255,255,0.5)", cursor:"pointer", transition:"all .2s" }}>↻ Try Again</button>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────

function App() {
  const [section, setSection] = useState(0);
  const [studentName, setStudentName] = useState("");
  const [score, setScore] = useState({ vocab:0, writing:0, order:0, partwhole:0, unitrate:0, realworld:0, mixed:0, exit:0 });
  const next = () => setSection(s => Math.min(s + 1, SECTIONS.length - 1));
  const restart = () => {
    setSection(0);
    setScore({ vocab:0, writing:0, order:0, partwhole:0, unitrate:0, realworld:0, mixed:0, exit:0 });
  };

  useEffect(() => {
    const el = document.getElementById("ws-top");
    if (el) el.scrollIntoView({ behavior:"smooth" });
  }, [section]);

  return (
    <div id="ws-top" style={{ maxWidth: 680, margin: "0 auto", padding: "32px 20px 60px" }}>
      {section > 0 && section < SECTIONS.length - 1 && (
        <div style={{ marginBottom: 20 }}>
          <SectionNav idx={section} onNav={setSection} />
          <div style={{ marginTop: 8 }}><ProgressBar current={section} total={SECTIONS.length} /></div>
        </div>
      )}
      {section === 0 && <Welcome onNext={next} studentName={studentName} setStudentName={setStudentName} />}
      {section === 1 && <VocabSection onNext={next} score={score} setScore={setScore} />}
      {section === 2 && <WritingSection onNext={next} score={score} setScore={setScore} />}
      {section === 3 && <OrderSection onNext={next} score={score} setScore={setScore} />}
      {section === 4 && <PartWholeSection onNext={next} score={score} setScore={setScore} />}
      {section === 5 && <UnitRateSection onNext={next} score={score} setScore={setScore} />}
      {section === 6 && <RealWorldSection onNext={next} score={score} setScore={setScore} />}
      {section === 7 && <MixedSection onNext={next} score={score} setScore={setScore} />}
      {section === 8 && <ExitTicketSection onNext={next} score={score} setScore={setScore} />}
      {section === 9 && <ResultsSection score={score} studentName={studentName} onRestart={restart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
